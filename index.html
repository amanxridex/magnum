<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnum | Premium Property</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Inter for that clean, bold, modern look seen in the reference -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Full-screen Background -->
    <div class="hero-bg">
        <div class="bg-overlay"></div>
    </div>

    <div class="page-wrapper">
        <!-- Floating Pill Navigation -->
        <header class="top-nav">
            <div class="nav-pill main-pill fade-in-down">
                <div class="brand">MAGNUM<i class="fas fa-gem"></i></div>
                <nav class="menu">
                    <a href="#" class="active">Home</a>
                    <a href="#">Details</a>
                    <a href="#">Featured</a>
                    <a href="#">Community</a>
                    <a href="#">Testimonial</a>
                </nav>
            </div>
            
            <a href="tel:+919814347079" class="nav-pill contact-pill fade-in-down delay-1">
                <span>Say "Hello"</span>
                <div class="icon-circle">
                    <i class="fas fa-arrow-up-right"></i>
                </div>
            </a>
        </header>

        <!-- Center Content -->
        <main class="center-content">
            <div class="floating-paragraphs fade-in-up">
                <p class="float-left">
                    Exclusive 21-Suite Kothi<br>
                    Chandigarh Aerocity
                </p>
                <p class="float-right">
                    Exclusive listings, competitive<br>
                    prices, and expert guidance–<br>
                    all in one place.
                </p>
            </div>

            <h1 class="massive-title fade-in-up delay-1">
                Discover your<br>
                <span class="gradient-text">Perfect property.</span>
            </h1>
        </main>

        <!-- Bottom Statistics -->
        <footer class="bottom-stats fade-in-up delay-2">
            <div class="stat-item">
                <h2>21</h2>
                <p>Luxury Suites</p>
            </div>
            <div class="stat-item">
                <h2>9,100+</h2>
                <p>Square Feet</p>
            </div>
            <div class="stat-item">
                <h2>₹72M+</h2>
                <p>Annual Yield Potential</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
